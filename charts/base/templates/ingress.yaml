{{- /* =================================================================== */ -}}
{{- /* NEW baseDomain mode (v0.1.75): triggered when ingress.baseDomain    */ -}}
{{- /* is set on a map-typed ingress value. Auto-generates host and TLS    */ -}}
{{- /* from namespace. Falls through to old list-mode for backward compat. */ -}}
{{- /* =================================================================== */ -}}
{{- if and .Values.ingress (kindIs "map" .Values.ingress) (hasKey .Values.ingress "baseDomain") (.Values.ingress.baseDomain) -}}
{{- $fullName := include "base.fullname" . -}}
{{- $service := .Values.service -}}
{{- if kindIs "slice" $service -}}
{{- $service = index $service 0 -}}
{{- end -}}
{{- $svcPort := 80 -}}
{{- if $service -}}
  {{- if hasKey $service "port" -}}
    {{- $svcPort = $service.port -}}
  {{- end -}}
{{- end -}}
{{- $host := include "base.ingressHost" . | trim -}}
{{- $tlsSecret := include "base.tlsSecretName" . | trim -}}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "base.labels" . | nindent 4 }}
  annotations:
    cert-manager.io/cluster-issuer: dns-issuer
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/ssl-protocols: "TLSv1.2 TLSv1.3"
    nginx.ingress.kubernetes.io/tls-ciphersuites: "TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,X-CustomHeader,X-LANG,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,X-Api-Key,X-Device-Id,Access-Control-Allow-Origin,Authorization,X-ORG-ID,x-org-id"
    {{- if .Values.ingress.annotations }}
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.class | default "nginx" }}
  tls:
    - secretName: {{ $tlsSecret }}
      hosts:
        - {{ $host | quote }}
  rules:
    - host: {{ $host | quote }}
      http:
        paths:
          - path: {{ .Values.ingress.path | default "/" }}
            pathType: Prefix
            backend:
              service:
                name: {{ $fullName }}
                port:
                  number: {{ $svcPort }}
{{- if and .Values.ingress.stickyEnabled .Values.ingress.baseDomainSticky }}
{{- $stickyHost := include "base.ingressHostSticky" . | trim -}}
{{- $stickyTlsSecret := printf "%s-%s" .Release.Namespace (.Values.ingress.tlsSuffixSticky | default "api-sticky-cert") -}}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}-sticky
  labels:
    {{- include "base.labels" . | nindent 4 }}
  annotations:
    cert-manager.io/cluster-issuer: dns-issuer
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/affinity: cookie
    nginx.ingress.kubernetes.io/affinity-mode: persistent
    nginx.ingress.kubernetes.io/session-cookie-name: route
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,X-CustomHeader,X-LANG,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,X-Api-Key,X-Device-Id,Access-Control-Allow-Origin,Authorization,X-ORG-ID,x-org-id"
    {{- if .Values.ingress.stickyAnnotations }}
    {{- toYaml .Values.ingress.stickyAnnotations | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.class | default "nginx" }}
  tls:
    - secretName: {{ $stickyTlsSecret }}
      hosts:
        - {{ $stickyHost | quote }}
  rules:
    - host: {{ $stickyHost | quote }}
      http:
        paths:
          - path: {{ .Values.ingress.path | default "/" }}
            pathType: Prefix
            backend:
              service:
                name: {{ $fullName }}
                port:
                  number: {{ $svcPort }}
{{- end }}
{{- else }}
{{- /* ====================== OLD LIST MODE (backward compat) ====================== */ -}}
{{- $hasIngress := false -}}
{{- if .Values.ingress -}}
  {{- if kindIs "slice" .Values.ingress -}}
    {{- if gt (len .Values.ingress) 0 -}}
      {{- $firstIngress := index .Values.ingress 0 -}}
      {{- if and (kindIs "map" $firstIngress) (hasKey $firstIngress "enabled") -}}
        {{- $hasIngress = $firstIngress.enabled -}}
      {{- else -}}
        {{- $hasIngress = true -}}
      {{- end -}}
    {{- end -}}
  {{- else if kindIs "map" .Values.ingress -}}
    {{- if hasKey .Values.ingress "enabled" -}}
      {{- $hasIngress = .Values.ingress.enabled -}}
    {{- else -}}
      {{- $hasIngress = true -}}
    {{- end -}}
  {{- else if kindIs "bool" .Values.ingress -}}
    {{- $hasIngress = .Values.ingress -}}
  {{- end -}}
{{- end -}}
{{- if $hasIngress -}}
{{- $fullName := include "base.fullname" . -}}
{{- $service := .Values.service -}}
{{- if kindIs "slice" $service -}}
{{- $service = index $service 0 -}}
{{- end -}}
{{- $svcPort := 80 -}}
{{- if $service -}}
  {{- if hasKey $service "port" -}}
    {{- $svcPort = $service.port -}}
  {{- end -}}
{{- end -}}
{{- $kubeVersion := (include "base.capabilities.kubeVersion" .) -}}
{{- $outerScope := . -}}
{{- range $key, $ingress := (ternary .Values.ingress (list .Values.ingress) (kindIs "slice" .Values.ingress)) }}
---
{{- if semverCompare ">=1.19-0" $kubeVersion -}}
apiVersion: networking.k8s.io/v1
{{- else if semverCompare ">=1.14-0" $kubeVersion -}}
apiVersion: networking.k8s.io/v1beta1
{{- else -}}
apiVersion: extensions/v1beta1
{{- end }}
kind: Ingress
metadata:
  name: {{ $fullName }}{{ coalesce $ingress.nameSuffix $key "" }}
  labels:
    {{- include "base.labels" $outerScope | nindent 4 }}
  {{- if $ingress.annotations }}
  annotations:
    {{- toYaml $ingress.annotations | nindent 4 }}
  {{- end }}
spec:
  {{- if $ingress.class }}
  ingressClassName: {{ $ingress.class }}
  {{- else if $ingress.ingressClassName }}
  ingressClassName: {{ $ingress.ingressClassName }}
  {{- end }}
  {{- if $ingress.tls }}
  tls:
    {{- range $ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  {{- if $ingress.defaultBackend }}
  defaultBackend:
    {{- toYaml $ingress.defaultBackend | nindent 4 }}
  {{- end }}
  rules:
    {{- range $ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            {{- if semverCompare ">=1.19-0" $kubeVersion }}
            pathType:
              {{- toYaml (dig "pathType" "Prefix" . ) | nindent 14 }}
            backend:
              service:
                name:
                  {{- toYaml (coalesce (dig "backend" "serviceName" "" . ) (dig "backend" "service" "name" "" .) $fullName) | nindent 18 }}
                port:
                  {{- if eq (kindOf (coalesce (dig "backend" "servicePort" "" . ) (dig "backend" "service" "port" "" .) $svcPort)) "string" }}
                  name: {{- toYaml (coalesce (dig "backend" "servicePort" "" . ) (dig "backend" "service" "port" "" .) $svcPort) | nindent 20 }}
                  {{- else }}
                  number:
                    {{- toYaml (coalesce (dig "backend" "servicePort" "" . ) (dig "backend" "service" "port" "" .) $svcPort) | nindent 20 }}
                  {{- end }}
            {{- else }}
            backend:
              serviceName:
                {{- toYaml (coalesce (dig "backend" "serviceName" "" . ) (dig "backend" "service" "name" "" .) $fullName) | nindent 16 }}
              servicePort:
                {{- toYaml (coalesce (dig "backend" "servicePort" "" . ) (dig "backend" "service" "port" "" .) $svcPort) | nindent 16 }}
            {{- end }}
          {{- end }}
    {{- end }}
{{- end }}
{{- end }}
{{- end }}
